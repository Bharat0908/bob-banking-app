{% extends "base.html" %}
{% block title %}Withdraw Funds — SecureBank{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-7 col-lg-5">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
      <h2 class="h4 fw-bold mb-0"><i class="bi bi-dash-circle text-warning me-2"></i>Withdraw Funds</h2>
    </div>
    {% if customer %}
    <div class="alert alert-light border d-flex align-items-center gap-2 mb-3 py-2">
      <i class="bi bi-wallet2 text-primary"></i>
      <span class="small">Available balance: <strong>{{ customer.formatted_balance() }}</strong></span>
    </div>
    {% endif %}
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post" action="{{ url_for('withdraw') }}" novalidate>
          <div class="mb-4">
            <label for="amount" class="form-label fw-semibold">Amount to Withdraw</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text text-muted">$</span>
              <input type="number" id="amount" name="amount" class="form-control" placeholder="0.00" min="0.01" step="0.01" {% if customer %}max="{{ customer.balance }}"{% endif %} required autofocus />
            </div>
            <div class="form-text">Amount cannot exceed your available balance.</div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-warning btn-lg text-dark"><i class="bi bi-check-circle me-1"></i>Confirm Withdrawal</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
