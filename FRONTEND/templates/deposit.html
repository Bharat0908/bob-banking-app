{% extends "base.html" %}
{% block title %}Deposit Funds — SecureBank{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-7 col-lg-5">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
      <h2 class="h4 fw-bold mb-0"><i class="bi bi-plus-circle text-success me-2"></i>Deposit Funds</h2>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post" action="{{ url_for('deposit') }}" novalidate>
          <div class="mb-4">
            <label for="amount" class="form-label fw-semibold">Amount to Deposit</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text text-muted">$</span>
              <input type="number" id="amount" name="amount" class="form-control" placeholder="0.00" min="0.01" step="0.01" required autofocus />
            </div>
            <div class="form-text">Enter a positive amount in USD.</div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success btn-lg"><i class="bi bi-check-circle me-1"></i>Confirm Deposit</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
