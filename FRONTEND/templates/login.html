{% extends "base.html" %}
{% block title %}Login — SecureBank{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-5">
    <div class="text-center mb-4">
      <div class="display-4 text-primary mb-2"><i class="bi bi-bank"></i></div>
      <h1 class="h3 fw-bold text-dark">Customer Login</h1>
      <p class="text-muted">Sign in to access your account</p>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form method="post" action="{{ url_for('login') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold"><i class="bi bi-person me-1"></i>Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" autocomplete="username" required autofocus />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold"><i class="bi bi-lock me-1"></i>Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-box-arrow-in-right me-1"></i>Log In</button>
          </div>
        </form>
      </div>
    </div>
    <div class="card mt-3 border-0 bg-info bg-opacity-10">
      <div class="card-body py-2 px-3 text-center small text-muted">
        <i class="bi bi-info-circle me-1"></i>
        Demo: username <strong>demo</strong> / password <strong>password123</strong>
      </div>
    </div>
  </div>
</div>
{% endblock %}
